# Benchling palette (verified against a live Benchling tenant, 2026-04-21):
# sidebar #000db5, heading accent #6e8cfc, buttons #3d65fb. Streamlit exposes
# one primary color, so we use the button blue as primaryColor and the dark
# sidebar blue as textColor.
[theme]
primaryColor = "#3d65fb"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#eef2ff"
textColor = "#000db5"
font = "sans serif"
base = "light"

[server]
headless = true
