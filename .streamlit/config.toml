# Benchling-inspired palette: lavender / indigo accents, IBM Plex typography.
# This aligns the demo visually with Benchling's UI so the tool feels native.
[theme]
primaryColor = "#6558f5"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f3ff"
textColor = "#1f1a3d"
font = "sans serif"
base = "light"

[server]
headless = true

# Python version for Streamlit Cloud is set via runtime.txt (or the
# dashboard's "Advanced settings") — not in this file.
